name: Linear Ticket Investigation

on:
  # Triggered by Linear webhook via GitHub API repository_dispatch
  repository_dispatch:
    types: [linear-ticket-investigation]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      ticket_id:
        description: "Linear ticket ID (e.g., ABC-123)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  GH_PAT: ${{ secrets.GH_PAT }}
  WEBAPP_REPO: ${{ vars.WEBAPP_REPO }}
  API_REPO: ${{ vars.API_REPO }}

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout investigation repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Determine ticket ID
        id: ticket
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ticket_id=${{ github.event.inputs.ticket_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "ticket_id=${{ github.event.client_payload.ticket_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch and validate ticket
        id: validate
        run: |
          node scripts/fetch-ticket.mjs "${{ steps.ticket.outputs.ticket_id }}" > /tmp/ticket.json
          echo "ticket_data<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/ticket.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Check if ticket is in a trigger state (Refined)
          TICKET_STATE=$(jq -r '.state // "unknown"' /tmp/ticket.json)
          TICKET_STATE_LOWER=$(echo "$TICKET_STATE" | tr '[:upper:]' '[:lower:]')
          if [ "$TICKET_STATE_LOWER" = "refined" ]; then
            echo "in_trigger_state=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_trigger_state=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Ticket is in \"$TICKET_STATE\" state — proceeding (triggered via dispatch)"
          fi

          # Check if ticket is well-scoped
          WELL_SCOPED=$(jq -r '.wellScoped' /tmp/ticket.json)
          echo "well_scoped=$WELL_SCOPED" >> "$GITHUB_OUTPUT"

          if [ "$WELL_SCOPED" = "false" ]; then
            SKIP_REASON=$(jq -r '.skipReason' /tmp/ticket.json)
            echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
            echo "::warning::Ticket is not well-scoped: $SKIP_REASON"
          fi

      - name: Early exit for poorly-scoped tickets
        if: steps.validate.outputs.well_scoped == 'false'
        run: |
          echo "Skipping investigation - ticket is not well-scoped."
          echo "Reason: ${{ steps.validate.outputs.skip_reason }}"
          # Post a comment back to Linear noting why we skipped
          node scripts/update-linear.mjs "${{ steps.ticket.outputs.ticket_id }}" --skip "${{ steps.validate.outputs.skip_reason }}"

      - name: Setup investigation workspace
        if: steps.validate.outputs.well_scoped != 'false'
        run: |
          bash scripts/setup-workspace.sh

      - name: Install Claude Code
        if: steps.validate.outputs.well_scoped != 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run AI investigation
        if: steps.validate.outputs.well_scoped != 'false'
        id: investigate
        run: |
          TICKET_DATA=$(cat /tmp/ticket.json)
          TICKET_TITLE=$(echo "$TICKET_DATA" | jq -r '.title')
          TICKET_DESC=$(echo "$TICKET_DATA" | jq -r '.description')
          TICKET_ID=$(echo "$TICKET_DATA" | jq -r '.identifier')
          TEAM_NAME=$(echo "$TICKET_DATA" | jq -r '.teamName')
          LABELS=$(echo "$TICKET_DATA" | jq -r '.labels | join(", ")')
          SENTRY_URLS=$(echo "$TICKET_DATA" | jq -r '.sentryUrls // [] | join("\n")')
          PRIORITY=$(echo "$TICKET_DATA" | jq -r '.priority')

          # Build the investigation prompt
          PROMPT=$(cat <<PROMPT_EOF
          You are investigating Linear ticket ${TICKET_ID}: "${TICKET_TITLE}"

          ## Ticket Details
          - **Team**: ${TEAM_NAME}
          - **Priority**: ${PRIORITY}
          - **Labels**: ${LABELS}

          ## Description
          ${TICKET_DESC}

          ## Sentry Error URLs (if any)
          ${SENTRY_URLS}

          ## Your Task

          Investigate this ticket following CLAUDE.md. Web-app: /tmp/workspace/web-app, api: /tmp/workspace/api.

          **Be terse.** The reader is a junior engineer who needs a starting point, not a design doc. Do not restate the ticket. Do not speculate. Do not pad. If you don't know something, omit the field.

          **Strict length limits (hard caps):**
          - startingPoint: <= 3 sentences. Name the file + function to open first and the one thing to change.
          - technicalAnalysis: <= 4 sentences. Only the current behavior and the specific gap.
          - existingPatterns: one file path + one sentence, or null.
          - Any other string: <= 2 sentences.
          - relevantFiles: <= 5 paths, only files the engineer must actually touch or read.

          **isLowHangingFruit — be extremely strict.** Set true ONLY if you are highly confident the ENTIRE fix is obvious and tiny. Qualifying categories:
          - Copy/color/styling tweak or small isolated UI component change
          - Adding a missing field to an existing DTO/controller that mirrors sibling fields
          - A small, tightly-scoped backend bug with an obvious root cause and a <20-line fix in 1-2 files

          Disqualifiers (any of these → false): unclear root cause, >2 files likely touched, new migrations, new dependencies, cross-cutting refactors, any guessing about intent, or you can't point to the exact lines to change. When in doubt: false.

          Output a single JSON object, nothing else:
          \`\`\`json
          {
            "summary": "One sentence.",
            "technicalAnalysis": "<= 4 sentences",
            "startingPoint": "<= 3 sentences, name file:function",
            "relevantFiles": ["up to 5 paths"],
            "existingPatterns": "path + 1 sentence, or null",
            "suggestedLabels": ["label1"],
            "estimatedComplexity": "low|medium|high",
            "isLowHangingFruit": false,
            "lowHangingFruitReason": "null unless true; then name the category + cite exact file/lines",
            "suggestedFix": "null unless LHF; then <=3 sentences describing the exact change",
            "sentryFindings": "<=2 sentences or null",
            "awsFindings": "<=2 sentences or null"
          }
          \`\`\`
          PROMPT_EOF
          )

          # Run Claude with the investigation prompt
          cd /tmp/workspace
          claude -p "$PROMPT" \
            --model claude-opus-4-6 \
            --max-turns 30 \
            --allowedTools "Read,Glob,Grep,Bash(read-only),mcp__sentry__*,mcp__aws__*" \
            > /tmp/investigation-result.json 2>/dev/null || true
          echo "=== Investigation result ==="
          cat /tmp/investigation-result.json

      - name: Update Linear with findings
        if: steps.validate.outputs.well_scoped != 'false'
        run: |
          node scripts/update-linear.mjs \
            "${{ steps.ticket.outputs.ticket_id }}" \
            --results /tmp/investigation-result.json

      - name: Create draft PR if low-hanging fruit
        if: steps.validate.outputs.well_scoped != 'false'
        id: draft_pr
        run: |
          # Check if the investigation result contains isLowHangingFruit: true
          if grep -qE '"isLowHangingFruit"\s*:\s*true' /tmp/investigation-result.json; then
            echo "low_hanging=true" >> "$GITHUB_OUTPUT"
            echo "Detected low-hanging fruit — creating draft PR..."
            node scripts/create-draft-pr.mjs \
              "${{ steps.ticket.outputs.ticket_id }}" \
              /tmp/investigation-result.json
          else
            echo "low_hanging=false" >> "$GITHUB_OUTPUT"
            echo "Not low-hanging fruit — skipping draft PR creation"
          fi
