name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - "lambda/**"
      - "infra/**"
      - ".github/workflows/deploy-lambda.yml"

  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK dependencies
        run: cd infra && npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy
        env:
          LINEAR_WEBHOOK_SECRET: ${{ secrets.LINEAR_WEBHOOK_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
        run: cd infra && npx cdk deploy --require-approval never --outputs-file /tmp/cdk-outputs.json

      - name: Show outputs
        run: |
          echo "### Deployed successfully" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/cdk-outputs.json >> "$GITHUB_STEP_SUMMARY"
